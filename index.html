<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MultiPull</title>
  <link href="https://fonts.googleapis.com/css?family=Google+Sans|Noto+Sans|Castoro" rel="stylesheet">
  <link rel="stylesheet" href="./static/css/bulma.min.css">
  <link rel="stylesheet" href="./static/css/fontawesome.all.min.css">
</head>
<body>

<section class="hero">
  <div class="hero-body">
    <div class="container is-max-desktop">
      <div class="columns is-centered">
        <div class="column has-text-centered">
          <!-- Title -->
          <h1 class="title is-1 publication-title">
            3D Gaussian Splatting with Self-Constrained Priors for High Fidelity Surface Reconstruction
          </h1>

          <!-- Conference -->
          <div class="column is-full_width">
            <h2 class="title is-4">CVPR 2026</h2>
          </div>

          <!-- Links (non-clickable) -->
          <div class="column has-text-centered">
            <div class="publication-links">
              <span class="link-block">
                <a href="javascript:void(0)" class="external-link button is-normal is-rounded is-dark">
                  <span class="icon"><i class="fas fa-file-pdf"></i></span>
                  <span>Paper</span>
                </a>
              </span>
              <span class="link-block">
                <a href="javascript:void(0)" class="external-link button is-normal is-rounded is-dark">
                  <span class="icon"><i class="fab fa-github"></i></span>
                  <span>Code</span>
                </a>
              </span>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</section>

</body>
</html>
